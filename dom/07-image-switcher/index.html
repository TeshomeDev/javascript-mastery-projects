<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Switcher</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <article class="image-switcher">
      <h2 class="image-switcher__title">
        Beautiful Images of Ethiopia
      </h2>

      <div class="image-switcher-container">
        <figure class="active-image-wrapper">
          <div class="active-image-container">
            <img class="active-image" />
          </div>
          
          <figcaption class="active-image-desc">

          </figcaption> 
        </figure>
        
        <div class="thumbnails-list-wrapper">
          <div class="thumbnails-list-track">

            <ul class="thumbnails-list"></ul>
            <ul class="thumbnails-list"></ul>

          </div>
        </div>
        

      </div>
    </article>
  </main>
  <script src="script.js"></script>
</body>
</html>
