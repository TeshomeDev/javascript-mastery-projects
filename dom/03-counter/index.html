<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="container__content">
      <h1 class="container__title">Current count</h1>
      <span class="container__current-value"></span>
      <div class="container__counter-btn">
        <button class="container__btn container__btn-inc">+</button>
        <button class="container__btn container__btn-dec">-</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
