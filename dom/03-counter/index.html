<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="container__title">Counter System</h1>
    <div class="container__content">
      <h2 class="container__content-title">Current value</h2>
      <span class="container__current-value"></span>
      <div class="container__actions">
        <div class="container__counter-btn">
          <button class="container__btn container__btn-inc" data-action="increment">+</button>
          <button class="container__btn container__btn-dec" data-action="decrement">-</button>
        </div>
        
        <button class="container__btn-reset" data-action="reset">Reset</button>
      </div>
      
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
