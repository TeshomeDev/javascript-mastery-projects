
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hide/Show Pasword</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">
    <div class="container__content">
      <h1 class="container__title">Toggle Password Visibility</h1>
      <div class="hideshow-container">
        <label for="password">Password: </label>
        <input 
        type="password" 
        id="password" placeholder="Enter password..." minlength="6" 
        maxlength="8" 
        class="hideshow-container__input">
        <button 
        class="hideshow-container__btn" 
        aria-label="Toggle password visibility" aria-pressed="false"
        data-action="toggle-visibility"
        >Show</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
