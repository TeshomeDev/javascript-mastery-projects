<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Mastery Projects</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 800px;
      margin-inline: auto;
    }

    h1 {
      font-size: 2.2rem;
      margin-block-end: 0.5rem;
      letter-spacing: -0.5px;
    }

    p {
      color: #666;
      margin-block-end: 2rem;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .card {
      background: white;
      padding: 1.25rem;
      border-radius: 12px;
      text-decoration: none;
      color: #111;
      box-shadow: 0 6px 18px -4px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    .card h3 {
      margin: 0.5rem 0;
      font-size: 1.1rem;
    }

    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: #666;
    }

    .tag {
      font-size: 0.8rem;
      color: #007bff;
      margin-block-end: 0.5rem;
      display: inline-block;
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <h1>JavaScript Mastery Projects</h1>
      <p>
        Learning JavaScript step-by-step through structured Dom projects.
      </p>

      <div class="grid">

        <a href="dom/01-toggle-text/index.html" class="card">
          <span class="tag">DOM Project 01</span>
          <h3>Toggle Text Component</h3>
          <p>Simple interactive UI using JavaScript DOM manipulation.</p>
        </a>

      </div>
    </div>
  </main>
</body>
</html>
